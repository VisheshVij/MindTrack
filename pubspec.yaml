name: aura_app
description: "Dementia assistant app"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # BLE — flutter_blue_plus works correctly on iOS
  flutter_blue_plus: ^1.32.12

  # Navigation
  url_launcher: ^6.2.6

  # Location & geofencing
  geolocator: ^11.0.0

  # Audio
  flutter_tts: ^3.8.5
  just_audio: ^0.9.36

  # State management
  provider: ^6.1.2

  # Date formatting
  intl: ^0.18.0

  # Notifications
  flutter_local_notifications: ^16.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/
    - assets/images/
    - assets/audio/